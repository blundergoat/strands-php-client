name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        symfony: ['^6.4', '^7.0']
    name: PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies for matrix
        run: |
          composer update --prefer-dist --no-interaction --no-progress \
            --with symfony/config:${{ matrix.symfony }} \
            --with symfony/dependency-injection:${{ matrix.symfony }} \
            --with symfony/framework-bundle:${{ matrix.symfony }} \
            --with symfony/http-client:${{ matrix.symfony }} \
            --with symfony/yaml:${{ matrix.symfony }}

      - name: Validate Composer
        run: composer validate --strict

      - name: Check coding style
        run: composer cs:check

      - name: Run static analysis
        run: composer analyse

      - name: Run PHPMD
        run: composer analyse:messdetector

      - name: Check cyclomatic complexity
        run: composer analyse:complexity

      - name: Run tests
        run: composer test

  coverage:
    runs-on: ubuntu-latest
    name: Coverage

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests with coverage
        run: composer test:coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('coverage.xml');
            \$metrics = \$xml->project->metrics;
            \$stmts = (int)\$metrics['statements'];
            \$covered = (int)\$metrics['coveredstatements'];
            echo \$stmts > 0 ? round(\$covered / \$stmts * 100, 1) : 0;
          ")
          echo "Coverage: ${COVERAGE}%"
          php -r "exit((float)'${COVERAGE}' >= 80 ? 0 : 1);"
