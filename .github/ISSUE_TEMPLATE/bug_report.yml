name: Bug Report
description: Report a bug in the Strands PHP Client
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Create a StrandsClient with ...
        2. Call invoke() with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, stack traces, or logs if available.
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      description: Output of `php -v`
      placeholder: "8.2.x / 8.3.x / 8.4.x"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: Output of `composer show blundergoat/strands-php-client | grep versions`
      placeholder: "1.x.x"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      description: Which HTTP transport are you using?
      options:
        - SymfonyHttpTransport (symfony/http-client)
        - PsrHttpTransport (Guzzle or other PSR-18)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: method
    attributes:
      label: Affected Method
      description: Which client method is affected?
      options:
        - invoke()
        - stream()
        - Both
        - Other / Not applicable

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context -Symfony version, OS, Docker, custom auth strategy, etc.
